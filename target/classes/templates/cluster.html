<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head(${cluster.name} + ' - FashionStyle')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="max-w-7xl mx-auto px-6 py-16">
    <a href="/" class="text-xs uppercase tracking-widest text-gray-400 hover:text-gold transition">&larr; Trang chủ</a>

    <div class="mt-8 pb-12 border-b border-gray-100">
        <p class="text-xs uppercase tracking-[0.3em] text-gold" th:text="'Cụm ' + ${cluster.id}"></p>
        <h1 class="text-4xl font-display font-bold mt-2" th:text="${cluster.name}">Name</h1>
        <p class="text-gray-400 text-sm mt-3 max-w-xl" th:text="${cluster.description}">Desc</p>
        <p class="text-xs text-gray-300 mt-2" th:text="${count} + ' sản phẩm'"></p>
    </div>

    <div class="flex items-center justify-between py-6 border-b border-gray-100">
        <div class="flex gap-6">
            <a th:href="@{/cluster/{id}(id=${cluster.id}, page=${currentPage}, sort=${sort}, dir=${dir}, view='grid')}" class="text-xs uppercase tracking-widest"
               th:classappend="${view == 'grid'} ? 'text-gray-900' : 'text-gray-300 hover:text-gray-600 transition'">Grid</a>
            <a th:href="@{/cluster/{id}(id=${cluster.id}, page=${currentPage}, sort=${sort}, dir=${dir}, view='list')}" class="text-xs uppercase tracking-widest"
               th:classappend="${view == 'list'} ? 'text-gray-900' : 'text-gray-300 hover:text-gray-600 transition'">List</a>
        </div>
        <div class="flex gap-6 text-xs uppercase tracking-widest">
            <a th:href="@{/cluster/{id}(id=${cluster.id}, page=${currentPage}, sort='name', dir='asc', view=${view})}" class="hover:text-gold transition" th:classappend="${sort == 'name'} ? 'text-gold' : 'text-gray-400'">Tên A-Z</a>
            <a th:href="@{/cluster/{id}(id=${cluster.id}, page=${currentPage}, sort='price', dir='asc', view=${view})}" class="hover:text-gold transition" th:classappend="${sort == 'price' and dir == 'asc'} ? 'text-gold' : 'text-gray-400'">Giá ↑</a>
            <a th:href="@{/cluster/{id}(id=${cluster.id}, page=${currentPage}, sort='price', dir='desc', view=${view})}" class="hover:text-gold transition" th:classappend="${sort == 'price' and dir == 'desc'} ? 'text-gold' : 'text-gray-400'">Giá ↓</a>
        </div>
    </div>

    <div th:if="${view == 'grid'}" class="grid grid-cols-2 md:grid-cols-4 gap-8 mt-10">
        <div th:each="p : ${products}" class="group cursor-pointer" th:data-url="@{/product/{id}(id=${p.id})}" onclick="window.location=this.dataset.url">
            <div class="aspect-[3/4] bg-gray-50 overflow-hidden">
                <img th:src="@{'https://picsum.photos/seed/' + ${p.id} + '/600/800'}" alt="" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
            </div>
            <div class="mt-4">
                <p class="text-[11px] uppercase tracking-[0.2em] text-gray-400" th:text="${p.genderLabel}"></p>
                <h3 class="font-medium text-sm mt-1" th:text="${p.name}">Name</h3>
                <p class="text-sm mt-2 font-medium" th:text="${p.formattedPrice}">Price</p>
            </div>
        </div>
    </div>

    <div th:if="${view == 'list'}" class="mt-10">
        <div th:each="p : ${products}" class="flex gap-6 py-6 border-b border-gray-50 cursor-pointer group" th:data-url="@{/product/{id}(id=${p.id})}" onclick="window.location=this.dataset.url">
            <div class="w-28 h-28 flex-shrink-0 overflow-hidden">
                <img th:src="@{'https://picsum.photos/seed/' + ${p.id} + '/200/200'}" alt="" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 flex flex-col justify-center">
                <p class="text-[11px] uppercase tracking-[0.2em] text-gray-400" th:text="${p.genderLabel}">Gender</p>
                <h3 class="font-medium mt-1" th:text="${p.name}">Name</h3>
                <p class="text-gray-400 text-xs mt-1" th:text="${p.clusterName}">Cluster</p>
                <p class="font-medium mt-2" th:text="${p.formattedPrice}">Price</p>
            </div>
        </div>
    </div>

    <div th:if="${totalPages > 1}" class="flex justify-center gap-4 mt-16">
        <a th:each="i : ${#numbers.sequence(0, totalPages-1)}"
           th:href="@{/cluster/{id}(id=${cluster.id}, page=${i}, sort=${sort}, dir=${dir}, view=${view})}"
           class="w-10 h-10 flex items-center justify-center text-xs uppercase tracking-widest border"
           th:classappend="${i == currentPage} ? 'border-gray-900 text-gray-900' : 'border-gray-100 text-gray-300 hover:border-gray-300 transition'"
           th:text="${i + 1}">1</a>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
