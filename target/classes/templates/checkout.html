<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head('Thanh toán - FashionStyle')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="max-w-3xl mx-auto px-6 py-16">
    <p class="text-xs uppercase tracking-[0.3em] text-gold mb-2">Thanh toán</p>
    <h1 class="text-3xl font-display font-bold">Thông tin giao hàng</h1>

    <div th:if="${#lists.isEmpty(cartItems)}" class="mt-12 text-center py-20 border border-gray-100">
        <p class="text-gray-400 text-sm">Giỏ hàng trống</p>
        <a href="/" class="inline-block text-xs uppercase tracking-widest border-b border-gray-900 pb-1 mt-4 hover:text-gold hover:border-gold transition">Mua sắm ngay</a>
    </div>

    <form action="/checkout" method="post" th:if="${not #lists.isEmpty(cartItems)}" class="mt-10 space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="text-xs uppercase tracking-widest text-gray-500">Họ tên</label>
                <input type="text" name="fullName" required class="w-full border-b border-gray-200 py-3 text-sm bg-transparent focus:outline-none focus:border-gold transition">
            </div>
            <div>
                <label class="text-xs uppercase tracking-widest text-gray-500">Số điện thoại</label>
                <input type="tel" name="phone" required class="w-full border-b border-gray-200 py-3 text-sm bg-transparent focus:outline-none focus:border-gold transition">
            </div>
        </div>
        <div>
            <label class="text-xs uppercase tracking-widest text-gray-500">Địa chỉ</label>
            <input type="text" name="address" required class="w-full border-b border-gray-200 py-3 text-sm bg-transparent focus:outline-none focus:border-gold transition">
        </div>
        <div>
            <label class="text-xs uppercase tracking-widest text-gray-500">Ghi chú</label>
            <textarea name="note" rows="3" class="w-full border-b border-gray-200 py-3 text-sm bg-transparent focus:outline-none focus:border-gold transition"></textarea>
        </div>

        <div class="border-t border-gray-100 pt-6">
            <div class="flex justify-between text-sm">
                <span class="text-gray-500">Tạm tính</span>
                <span th:text="${total}">Total</span>
            </div>
            <div class="flex justify-between text-sm mt-2">
                <span class="text-gray-500">Phí vận chuyển</span>
                <span>Miễn phí</span>
            </div>
            <div class="flex justify-between text-lg font-display font-bold mt-4 pt-4 border-t border-gray-100">
                <span>Tổng cộng</span>
                <span th:text="${total}">Total</span>
            </div>
        </div>

        <button type="submit" class="w-full bg-gray-900 text-white text-sm uppercase tracking-widest py-4 hover:bg-gold transition mt-4">Đặt hàng</button>
    </form>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
