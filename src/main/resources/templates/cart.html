<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head('Giỏ hàng - FashionStyle')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="max-w-4xl mx-auto px-6 py-16">
    <p class="text-xs uppercase tracking-[0.3em] text-gold mb-2">Giỏ hàng</p>
    <h1 class="text-3xl font-display font-bold">Đơn hàng của bạn</h1>

    <div th:if="${#lists.isEmpty(cartItems)}" class="mt-12 text-center py-20 border border-gray-100">
        <p class="text-gray-400 text-sm">Giỏ hàng trống</p>
        <a href="/" class="inline-block text-xs uppercase tracking-widest border-b border-gray-900 pb-1 mt-4 hover:text-gold hover:border-gold transition">Mua sắm ngay</a>
    </div>

    <div th:if="${not #lists.isEmpty(cartItems)}">
        <div class="mt-10">
            <div th:each="item : ${cartItems}" class="flex items-center gap-6 py-6 border-b border-gray-50">
                <div class="w-20 h-24 flex-shrink-0 overflow-hidden">
                    <img th:src="@{${item.imageUrl}}" alt="" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-sm" th:text="${item.productName}">Name</h3>
                    <p class="text-xs text-gray-400 mt-1" th:text="${item.formattedPrice}">Price</p>
                </div>
                <form action="/cart/update" method="post" class="flex items-center gap-2">
                    <input type="hidden" name="productId" th:value="${item.productId}">
                    <select name="quantity" onchange="this.form.submit()" class="border border-gray-200 px-2 py-1 text-xs bg-transparent focus:outline-none focus:border-gold">
                        <option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="${i}" th:selected="${i == item.quantity}"></option>
                    </select>
                </form>
                <p class="text-sm font-medium w-24 text-right" th:text="${item.formattedSubtotal}">Subtotal</p>
                <form action="/cart/remove" method="post">
                    <input type="hidden" name="productId" th:value="${item.productId}">
                    <button type="submit" class="text-gray-300 hover:text-red-400 transition text-xs uppercase tracking-widest">Xoá</button>
                </form>
            </div>
        </div>

        <div class="text-right mt-8">
            <p class="text-xs uppercase tracking-widest text-gray-500">Tạm tính</p>
            <p class="text-2xl font-display font-bold mt-1" th:text="${total}">Total</p>
            <a href="/checkout" class="inline-block mt-6 bg-gray-900 text-white text-sm uppercase tracking-widest py-4 px-12 hover:bg-gold transition">Thanh toán</a>
        </div>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
