<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head('FashionStyle - Thời trang cho mọi phong cách')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<section class="relative h-[90vh] min-h-[600px] flex items-center bg-gray-900">
    <img src="https://picsum.photos/seed/fashion/1920/1080" alt="" class="absolute inset-0 w-full h-full object-cover opacity-60">
    <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/50 to-transparent"></div>
    <div class="relative max-w-7xl mx-auto px-6 w-full">
        <div class="max-w-2xl">
            <p class="text-xs uppercase tracking-[0.3em] text-gold mb-4">Bộ sưu tập mới</p>
            <h1 class="text-5xl md:text-7xl font-display font-bold leading-tight text-white">
                Thời trang<br>
                <span class="text-gold italic font-normal">cho mọi phong cách</span>
            </h1>
            <p class="text-gray-300 text-sm leading-relaxed mt-6 max-w-md">
                Khám phá bộ sưu tập được phân loại thông minh theo 5 phong cách — từ công sở thanh lịch đến đường phố cá tính.
            </p>
            <a href="#clusters" class="inline-flex items-center gap-2 mt-8 text-sm uppercase tracking-widest border-b border-white pb-1 text-white hover:text-gold hover:border-gold transition">
                Khám phá <span>&rarr;</span>
            </a>
        </div>
    </div>
</section>

<div class="border-t border-gray-100"></div>

<section id="clusters" class="max-w-7xl mx-auto px-6 py-20">
    <p class="text-xs uppercase tracking-[0.3em] text-gold mb-2">Danh mục</p>
    <h2 class="text-3xl font-display font-bold">Phong cách nổi bật</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-0 mt-12 border-l border-t border-gray-100">
        <div th:each="c : ${clusters}" class="cluster-card border-r border-b border-gray-100 p-8 cursor-pointer group" th:data-url="@{/cluster/{id}(id=${c.id})}" onclick="window.location=this.dataset.url">
            <div class="text-4xl mb-6" th:text="${c.icon}"></div>
            <h3 class="font-display text-xl font-bold" th:text="${c.name}">Name</h3>
            <p class="text-gray-400 text-sm mt-2 leading-relaxed" th:text="${c.description}">Desc</p>
            <span class="inline-block text-xs uppercase tracking-widest text-gray-900 group-hover:text-gold transition mt-4">Khám phá &rarr;</span>
        </div>
    </div>
</section>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
